<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g transform="translate(50, 45) rotate(45)">
    <!-- eraser (red) -->
    <!-- Dome shaped path for a perfect cartoony eraser -->
    <path d="M -10,-15 L -10,-22 A 10,6 0 0,1 10,-22 L 10,-15 Z" fill="#e53935" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- metal band (gray) -->
    <rect x="-12" y="-15" width="24" height="10" rx="1" fill="#cfd8dc" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- body (orange) -->
    <rect x="-12" y="-5" width="24" height="35" fill="#f57c00" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
    <line x1="-4" y1="-5" x2="-4" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="4" y1="-5" x2="4" y2="30" stroke="#000" stroke-width="2"/>
    
    <!-- wood cone -->
    <polygon points="-12,30 12,30 0,50" fill="#ffcc80" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- lead (black) -->
    <polygon points="-3.6,44 3.6,44 0,50" fill="#000" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
