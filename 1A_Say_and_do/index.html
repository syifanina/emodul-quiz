<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymnastic Day! - Say and Do 1A</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <img src="https://lh3.googleusercontent.com/d/1Wtb9UWtvVhVA13B0HLBagfyx1bD1LU5x" class="top-border" alt="Top Border">
        <img src="https://lh3.googleusercontent.com/d/19NE3XzidRxaYa56e4OBOdI38n3nYJhwK" class="bottom-border" alt="Bottom Border">
        <header class="module-header">
            <img src="https://lh3.googleusercontent.com/d/1dgOfwQzhlIrueUsQo7ZWHS8-ssLPXT5N" alt="Say and Do"
                class="title-badge">

            <div class="instructions">
                <p class="en">Retell the story with actions.</p>
                <p class="en">Use the template to help you!</p>
                <div class="separator"></div>
                <p class="id">Ceritakan kembali cerita tadi disertai peragaan.</p>
                <p class="id">Gunakan template berikut sebagai bantuan!</p>
            </div>
        </header>

        <div class="scroll-content">
            <div class="story-box">
                <h2 class="story-title">GYMNASTIC DAY</h2>
                <div class="story-content">
                    <div class="story-line">Let's do gymnastic.</div>
                    <div class="story-line">First,
                        <img class="inline-gif gif-1"
                            src="https://lh3.googleusercontent.com/d/1YlN0EFeVDBqshWMpYM8w3QBrh_1x1PgC"
                            alt="touch your head">
                        , then
                        <img class="inline-gif gif-2"
                            src="https://lh3.googleusercontent.com/d/1s1mm4B3j4RIJ4UCRku28aIG6V6i9Mz3W"
                            alt="stretch your arms">
                        .
                    </div>
                    <div class="story-line">After that
                        <img class="inline-gif gif-3"
                            src="https://lh3.googleusercontent.com/d/1N7QJM-AkFdr0BKNspLKTSebbzXC-G2uM"
                            alt="clap your hands">
                        .
                    </div>
                    <div class="story-line">Now
                        <img class="inline-gif gif-4"
                            src="https://lh3.googleusercontent.com/d/1k2daAsbSy4MW4X7nljQYeZjcorkS_6Cp"
                            alt="stomp your feet">
                        , then
                        <img class="inline-gif gif-5"
                            src="https://lh3.googleusercontent.com/d/1089miNQdWKw3dRimHAN2zc15o1Jk3Dse"
                            alt="bend your knees">
                        and
                        <img class="inline-gif gif-6"
                            src="https://lh3.googleusercontent.com/d/1Lul99REcf0OOKn8eXKlb3v2yTtjn6BSP"
                            alt="wave your hand">
                        .
                    </div>
                    <div class="story-line">Finally,
                        <img class="inline-gif gif-7"
                            src="https://lh3.googleusercontent.com/d/1xLZ316inMljYDSYbHvpm5lTKp66lakPj"
                            alt="cross your legs">
                        and
                        <img class="inline-gif gif-8"
                            src="https://lh3.googleusercontent.com/d/1aB3tUScO1bVD7rB8kN0gMsDiq98WXg_V"
                            alt="close your eyes">
                        .
                    </div>
                    <div class="story-line">Good job!</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
