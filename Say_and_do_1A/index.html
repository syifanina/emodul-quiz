<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymnastic Day! - Say and Do 1A</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <header class="module-header">
            <img src="https://lh3.googleusercontent.com/d/1dgOfwQzhlIrueUsQo7ZWHS8-ssLPXT5N" alt="Say and Do" class="title-badge">

            <div class="instructions">
                <p class="en">Retell the story with actions.</p>
                <p class="en">Use the template to help you!</p>
                <div class="separator"></div>
                <p class="id">Ceritakan kembali cerita tadi disertai peragaan.</p>
                <p class="id">Gunakan template berikut sebagai bantuan!</p>
            </div>
        </header>

        <div class="scroll-content">
            <div class="story-box">
                <h2 class="story-title">GYMNASTIC DAY</h2>
                <p class="story-intro">Let's do gymnastic.</p>

                <div class="story-rows">

                    <!-- Row 1 -->
                    <div class="story-row">
                        <span class="row-text">First,</span>
                        <img class="row-gif gif-1" src="https://lh3.googleusercontent.com/d/1YlN0EFeVDBqshWMpYM8w3QBrh_1x1PgC" alt="touch your head">
                        <span class="row-text">then</span>
                        <img class="row-gif gif-2" src="https://lh3.googleusercontent.com/d/1s1mm4B3j4RIJ4UCRku28aIG6V6i9Mz3W" alt="stretch your arms">
                    </div>

                    <!-- Row 2 -->
                    <div class="story-row">
                        <span class="row-text">After that</span>
                        <img class="row-gif gif-3" src="https://lh3.googleusercontent.com/d/1N7QJM-AkFdr0BKNspLKTSebbzXC-G2uM" alt="clap your hands">
                        <span class="row-text">Now</span>
                        <img class="row-gif gif-4" src="https://lh3.googleusercontent.com/d/1k2daAsbSy4MW4X7nljQYeZjcorkS_6Cp" alt="stomp your feet">
                    </div>

                    <!-- Row 3 -->
                    <div class="story-row">
                        <span class="row-text">then</span>
                        <img class="row-gif gif-5" src="https://lh3.googleusercontent.com/d/1089miNQdWKw3dRimHAN2zc15o1Jk3Dse" alt="bend your knees">
                        <span class="row-text">and</span>
                        <img class="row-gif gif-6" src="https://lh3.googleusercontent.com/d/1Lul99REcf0OOKn8eXKlb3v2yTtjn6BSP" alt="wave your hand">
                    </div>

                    <!-- Row 4 -->
                    <div class="story-row">
                        <span class="row-text">Finally,</span>
                        <img class="row-gif gif-7" src="https://lh3.googleusercontent.com/d/1xLZ316inMljYDSYbHvpm5lTKp66lakPj" alt="cross your legs">
                        <span class="row-text">and</span>
                        <img class="row-gif gif-8" src="https://lh3.googleusercontent.com/d/1aB3tUScO1bVD7rB8kN0gMsDiq98WXg_V" alt="close your eyes">
                    </div>

                </div>

                <p class="story-ending">Good job! 🎉</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
