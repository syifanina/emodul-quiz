<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Routines - Look and Say</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <img src="https://lh3.googleusercontent.com/d/1Wtb9UWtvVhVA13B0HLBagfyx1bD1LU5x" class="top-border" alt="Top Border">
        <img src="https://lh3.googleusercontent.com/d/19NE3XzidRxaYa56e4OBOdI38n3nYJhwK" class="bottom-border" alt="Bottom Border">

        <header class="module-header">
            <!-- PNG Judul -->
            <img src="https://lh3.googleusercontent.com/d/1Vx2LN8Nudb8WDRvo4XviOVlgQE9O8ht9" alt="Look and Say" class="title-badge">
            
            <div class="instructions">
                <p class="en">Say these parts of the day!</p>
                <div class="separator"></div>
                <p class="id">Ucapkan bagian-bagian hari berikut!</p>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="scroll-content">
            <!-- Item 1: Morning -->
            <div class="look-say-item">
                <div class="image-container" id="container-1">
                    <!-- Main GIF (PNG initially) -->
                    <img src="https://lh3.googleusercontent.com/d/1H6F-PWE2jnHv1G67xNeiVB5_X58kZEZ0" data-png="https://lh3.googleusercontent.com/d/1H6F-PWE2jnHv1G67xNeiVB5_X58kZEZ0" data-gif="https://lh3.googleusercontent.com/d/1QDYHbnPRZ_AIblmk1XCr35YEKHiawh2Z" alt="Morning" class="main-gif">

                    <button class="sound-btn" data-index="0" title="Play/Pause Sound">
                        <!-- Play Icon -->
                        <svg class="sound-icon" viewBox="0 0 24 24">
                            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                        </svg>
                    </button>
                </div>
                <div class="gif-label">Morning</div>
            </div>

            <!-- Item 2: Noon -->
            <div class="look-say-item">
                <div class="image-container" id="container-2">
                    <!-- Main GIF (PNG initially) -->
                    <img src="https://lh3.googleusercontent.com/d/1W-wr-HzH99BXiYPRK_xcs2BpwBMnIR9D" data-png="https://lh3.googleusercontent.com/d/1W-wr-HzH99BXiYPRK_xcs2BpwBMnIR9D" data-gif="https://lh3.googleusercontent.com/d/1YHGWvqMZrlqM1XADGTxb78C4NwDKJI3K" alt="Noon" class="main-gif">

                    <button class="sound-btn" data-index="1" title="Play/Pause Sound">
                        <!-- Play Icon -->
                        <svg class="sound-icon" viewBox="0 0 24 24">
                            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                        </svg>
                    </button>
                </div>
                <div class="gif-label">Noon</div>
            </div>

            <!-- Item 3: Afternoon -->
            <div class="look-say-item">
                <div class="image-container" id="container-3">
                    <!-- Main GIF (PNG initially) -->
                    <img src="https://lh3.googleusercontent.com/d/1-xxGL0CqDrHy3xSbVxQD8w_xterzPUXc" data-png="https://lh3.googleusercontent.com/d/1-xxGL0CqDrHy3xSbVxQD8w_xterzPUXc" data-gif="https://lh3.googleusercontent.com/d/1IT6-jMYkVAlDOgDFhISGffN76r_HJhQJ" alt="Afternoon" class="main-gif">

                    <button class="sound-btn" data-index="2" title="Play/Pause Sound">
                        <!-- Play Icon -->
                        <svg class="sound-icon" viewBox="0 0 24 24">
                            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                        </svg>
                    </button>
                </div>
                <div class="gif-label">Afternoon</div>
            </div>

            <!-- Item 4: Evening -->
            <div class="look-say-item">
                <div class="image-container" id="container-4">
                    <!-- Main GIF (PNG initially) -->
                    <img src="https://lh3.googleusercontent.com/d/1onaw3WV5UhaJfksWqPg_tDtCPX5lSU9y" data-png="https://lh3.googleusercontent.com/d/1onaw3WV5UhaJfksWqPg_tDtCPX5lSU9y" data-gif="https://lh3.googleusercontent.com/d/1Trj5q9LJZHHuBfd5ZIdPCf1I-sdccWmB" alt="Evening" class="main-gif">

                    <button class="sound-btn" data-index="3" title="Play/Pause Sound">
                        <!-- Play Icon -->
                        <svg class="sound-icon" viewBox="0 0 24 24">
                            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                        </svg>
                    </button>
                </div>
                <div class="gif-label">Evening</div>
            </div>

            <!-- Item 5: Night -->
            <div class="look-say-item">
                <div class="image-container" id="container-5">
                    <!-- Main GIF (PNG initially) -->
                    <img src="https://lh3.googleusercontent.com/d/1K3zWD_LJ_FR8LOSQ7N5wt_e0JvLgbQmD" data-png="https://lh3.googleusercontent.com/d/1K3zWD_LJ_FR8LOSQ7N5wt_e0JvLgbQmD" data-gif="https://lh3.googleusercontent.com/d/1xPvc_TGSAH1hevMaKLFT8xumZOcxvXNt" alt="Night" class="main-gif">

                    <button class="sound-btn" data-index="4" title="Play/Pause Sound">
                        <!-- Play Icon -->
                        <svg class="sound-icon" viewBox="0 0 24 24">
                            <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                        </svg>
                    </button>
                </div>
                <div class="gif-label">Night</div>
            </div>
        </div>

        <audio id="main-audio"></audio>
    </div>

    <script src="script.js"></script>
</body>

</html>
