<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Routines - Read and Say</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <header class="module-header">
            <!-- PNG Judul -->
            <img src="https://lh3.googleusercontent.com/d/1F05FA2K1rdU4cQZeARx-U2gwprvYCeeN" alt="Read and Say" class="title-badge">
            
            <div class="instructions">
                <p class="en">Listen to the sentence. Then, say it aloud!</p>
                <div class="separator"></div>
                <p class="id">Dengarkan kalimatnya. Lalu, ucapkan dengan lantang!</p>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="scroll-content">
            <h2 class="module-title">"My Daily Routines"</h2>

            <div class="image-container">
                <!-- Main GIF -->
                <img src="https://lh3.googleusercontent.com/d/1mGF5AsPir6Yd3ZqNOmNlfKEiMQK4gxnz" alt="My Daily Routines" class="main-gif">

                <button class="sound-btn" id="play-btn" title="Play/Pause Sound">
                    <!-- Play Icon (Default) -->
                    <svg id="sound-icon" viewBox="0 0 24 24">
                        <path
                            d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
                    </svg>
                </button>
            </div>

            <table class="phrase-table">
                <tr>
                    <td>
                        <div class="phrase" id="phrase-0">Wake up</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-1">Brush my teeth</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-2">Take a bath</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-3">Have breakfast</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-4">Go to school</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-5">Study in class</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-6">Have lunch</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-7">Go home</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-8">Play with friends</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-9">Have dinner</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-10">Do homework</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="phrase" id="phrase-11">Go to bed</div>
                    </td>
                </tr>
            </table>
        </div>

        <audio id="main-audio"></audio>
    </div>

    <script src="script.js"></script>
</body>

</html>
