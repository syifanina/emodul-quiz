<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look and Say - My Parts of Body</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <img src="https://lh3.googleusercontent.com/d/1Wtb9UWtvVhVA13B0HLBagfyx1bD1LU5x" class="top-border" alt="Top Border">
        <img src="https://lh3.googleusercontent.com/d/19NE3XzidRxaYa56e4OBOdI38n3nYJhwK" class="bottom-border" alt="Bottom Border">
        <!-- Header (Sticky) -->
        <header class="module-header">
            <img src="https://lh3.googleusercontent.com/d/10ge7Zgmznf-vIQvMD3_hoA_j68RHj2aK" alt="Look and Say"
                class="title-badge">
            <div class="instructions">
                <p class="en">Read the words aloud!</p>
                <div class="separator"></div>
                <p class="id">Bacalah kata-kata di bawah ini dengan suara nyaring!</p>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="scroll-content">
            <h2 class="module-title">My Parts of Body</h2>

            <!-- Interactive Image 1 -->
            <div class="image-container" id="container-1">
                <img src="https://lh3.googleusercontent.com/d/1JDlejC--cXM25VRCSyfktRp3hYM9LTql" alt="Head and Hands"
                    class="main-image">

                <!-- Hotspots Section 1 -->
                <button class="hotspot color-1" data-word="Head"
                    style="top: 8.5%; left: 40.8%; width: 14.5%; height: 5%;" title="Head"><span>HEAD</span></button>
                <button class="hotspot color-2" data-word="Neck"
                    style="top: 40.2%; left: 60.5%; width: 13.5%; height: 5%;" title="Neck"><span>NECK</span></button>
                <button class="hotspot color-3" data-word="Finger"
                    style="top: 54.2%; left: 13.5%; width: 15%; height: 5%;" title="Finger"><span>FINGER</span></button>
                <button class="hotspot color-4" data-word="Nail"
                    style="top: 51.5%; left: 65.8%; width: 12%; height: 5%;" title="Nail"><span>NAIL</span></button>
                <button class="hotspot color-5" data-word="Left_Hand"
                    style="top: 74.5%; left: 30.8%; width: 12.5%; height: 7.5%;" title="Left Hand"><span>LEFT
                        HAND</span></button>
                <button class="hotspot color-6" data-word="Right_Hand"
                    style="top: 75%; left: 56.2%; width: 12.5%; height: 7.5%;" title="Right Hand"><span>RIGHT
                        HAND</span></button>
                <button class="hotspot color-1" data-word="Hands"
                    style="top: 87.5%; left: 42.2%; width: 15%; height: 5%;" title="Hands"><span>HANDS</span></button>
            </div>

            <!-- Interactive Image 2 -->
            <div class="image-container" id="container-2">
                <img src="https://lh3.googleusercontent.com/d/1Oiwieh6gfCwYV_94seFi_OS4NdHkS9Y7" alt="Full Body Parts"
                    class="main-image">

                <!-- Hotspots Section 2 -->
                <button class="hotspot color-1" data-word="Eyebrow"
                    style="top: 5.8%; left: 28%; width: 18.5%; height: 5%;"
                    title="Eyebrow"><span>EYEBROW</span></button>
                <button class="hotspot color-2" data-word="Hair" style="top: 5.8%; left: 53.8%; width: 12%; height: 5%;"
                    title="Hair"><span>HAIR</span></button>
                <button class="hotspot color-3" data-word="Ear" style="top: 14.5%; left: 23.5%; width: 11%; height: 5%;"
                    title="Ear"><span>EAR</span></button>
                <button class="hotspot color-4" data-word="Eye" style="top: 13.8%; left: 61%; width: 11%; height: 5%;"
                    title="Eye"><span>EYE</span></button>
                <button class="hotspot color-5" data-word="Mouth"
                    style="top: 25.5%; left: 23.8%; width: 14%; height: 5%;" title="Mouth"><span>MOUTH</span></button>
                <button class="hotspot color-6" data-word="Nose"
                    style="top: 23.8%; left: 61.2%; width: 13%; height: 5%;" title="Nose"><span>NOSE</span></button>
                <button class="hotspot color-1" data-word="Hand"
                    style="top: 39.8%; left: 18.5%; width: 11%; height: 5%;" title="Hand"><span>HAND</span></button>
                <button class="hotspot color-2" data-word="Arm" style="top: 45%; left: 29.2%; width: 11%; height: 5%;"
                    title="Arm"><span>ARM</span></button>
                <button class="hotspot color-3" data-word="Shoulder"
                    style="top: 40%; left: 61.5%; width: 19%; height: 5%;"
                    title="Shoulder"><span>SHOULDER</span></button>
                <button class="hotspot color-4" data-word="Waist"
                    style="top: 49.5%; left: 64.5%; width: 14%; height: 5%;" title="Waist"><span>WAIST</span></button>
                <button class="hotspot color-5" data-word="Leg" style="top: 65.5%; left: 23.5%; width: 12%; height: 5%;"
                    title="Leg"><span>LEG</span></button>
                <button class="hotspot color-6" data-word="Knee"
                    style="top: 63.5%; left: 61.8%; width: 13%; height: 5%;" title="Knee"><span>KNEE</span></button>
                <button class="hotspot color-1" data-word="Foot"
                    style="top: 81.8%; left: 61.5%; width: 12%; height: 5%;" title="Foot"><span>FOOT</span></button>
            </div>
        </div>

        <!-- Single audio element for dynamic src -->
        <audio id="main-audio"></audio>
    </div>

    <script src="script.js"></script>
</body>

</html>
