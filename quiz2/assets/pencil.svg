<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g transform="translate(50, 45) rotate(45)">
    <!-- eraser (red) -->
    <path d="M -10,-15 L 10,-15 Q 15,-20 10,-25 Q -10,-25 -15,-20 Z" fill="#e53935" stroke="#000" stroke-width="2"/>
    <!-- metal band (gray) -->
    <polygon points="-12,-15 12,-15 12,-5 -12,-5" fill="#cfd8dc" stroke="#000" stroke-width="2"/>
    <!-- body (orange) -->
    <polygon points="-12,-5 12,-5 12,30 -12,30" fill="#f57c00" stroke="#000" stroke-width="2"/>
    <line x1="-4" y1="-5" x2="-4" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="4" y1="-5" x2="4" y2="30" stroke="#000" stroke-width="2"/>
    <!-- wood cone -->
    <polygon points="-12,30 12,30 0,50" fill="#ffcc80" stroke="#000" stroke-width="2"/>
    <!-- lead (black) -->
    <polygon points="-3.6,44 3.6,44 0,50" fill="#000" stroke="#000" stroke-width="2"/>
  </g>
</svg>
