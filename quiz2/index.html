<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Look and Write Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">
    <!-- EXAMPLE -->
    <div class="example-row">
      <div class="img-card">
        <div class="number-badge example-badge">EXAMPLE</div>
        <div class="img-box example-img">
          <div class="img-placeholder">
            <img src="assets/ear.png" alt="ear">
          </div>
        </div>
      </div>
      <div class="answer-area">
        <div class="jumble-word">A R E</div>
        <div class="input-container example-container">
          <div class="input-inner">
             <div class="example-text">Ear</div>
          </div>
          <img src="assets/pencil.svg" class="pencil-icon" alt="pencil">
        </div>
      </div>
    </div>

    <!-- QUIZ ITEMS -->
    <div id="quiz-container">

      <!-- Item 1 -->
      <div class="quiz-row" id="row-1">
        <div class="img-card">
          <div class="number-badge">1</div>
          <div class="img-box">
            <div class="img-placeholder">
              <img src="assets/elbow.png" alt="elbow">
            </div>
          </div>
        </div>
        <div class="answer-area">
          <div class="jumble-word">B L E W O</div>
          <div class="input-container">
            <div class="input-inner">
              <input type="text" class="answer-input" id="input-1" data-answer="ELBOW" placeholder="Type your answer here..."
                autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <img src="assets/pencil.svg" class="pencil-icon" alt="pencil">
          </div>
          <div class="feedback-icon" id="fb-1"></div>
        </div>
      </div>

    </div><!-- end quiz-container -->

    <div class="btn-row">
      <button class="reset-btn" onclick="resetAnswers()">Reset</button>
      <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
    </div>
    <div class="result-msg" id="result-msg"></div>

  </div><!-- end page -->

  <script src="script.js"></script>
