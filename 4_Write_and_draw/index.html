                            <text x="100" y="32" class="clock-number">12</text>
                            <text x="136" y="42" class="clock-number">1</text>
                            <text x="162" y="68" class="clock-number">2</text>

                            <text x="38" y="68" class="clock-number">10</text>
                            <text x="64" y="42" class="clock-number">11</text>

                            <circle cx="100" cy="100" r="6" class="clock-pin" />

                            <g transform="rotate(150, 100, 100)">
                                <line x1="100" y1="100" x2="100" y2="62" class="hour-hand" />
                                <polygon points="94,62 106,62 100,50" fill="#ef4444" />
                            </g>
                            <g transform="rotate(0, 100, 100)">
                                <line x1="100" y1="100" x2="100" y2="47" class="minute-hand" />
                                <polygon points="95,47 105,47 100,35" fill="#3b82f6" />
                            </g>

                </div>
